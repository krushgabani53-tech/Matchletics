<!DOCTYPE html>
<html>
<head>
    <title>Debug Token</title>
</head>
<body>
    <h1>Token Debug</h1>
    <button onclick="checkToken()">Check Token in LocalStorage</button>
    <button onclick="testAPI()">Test API Call</button>
    <pre id="output"></pre>

    <script>
        function checkToken() {
            const token = localStorage.getItem('token');
            const output = document.getElementById('output');
            output.textContent = 'Token: ' + (token || 'NOT FOUND') + '\n\n';
            
            if (token) {
                // Decode JWT (just the payload, not verifying signature)
                try {
                    const parts = token.split('.');
                    const payload = JSON.parse(atob(parts[1]));
                    output.textContent += 'Decoded Payload:\n' + JSON.stringify(payload, null, 2);
                } catch (e) {
                    output.textContent += 'Error decoding: ' + e.message;
                }
            }
        }

        async function testAPI() {
            const token = localStorage.getItem('token');
            const output = document.getElementById('output');
            
            if (!token) {
                output.textContent = 'No token found!';
                return;
            }

            try {
                const response = await fetch('http://localhost:8000/api/users/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                output.textContent = `Status: ${response.status}\n\n`;
                const data = await response.json();
                output.textContent += JSON.stringify(data, null, 2);
            } catch (e) {
                output.textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
