services:
  - type: web
    name: matchlatics-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: matchlatics-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: matchlatics-db
    plan: free
